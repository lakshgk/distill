[build-system]
requires      = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name        = "distill-core"
version     = "0.1.0"
description = "Convert any document format to clean, LLM-optimized Markdown"
readme      = "README.md"
license     = { text = "MIT" }
requires-python = ">=3.10"

keywords = [
    "markdown", "document", "conversion", "llm", "pdf", "docx", "xlsx", "pptx",
    "rag", "nlp", "text-extraction",
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Markup",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

# Core dependencies (always installed)
dependencies = [
    "mammoth>=1.6",
    "python-docx>=1.1",
    "openpyxl>=3.1",
    "pdfplumber>=0.10",
    "python-pptx>=0.6.23",
]

[project.optional-dependencies]
# Scanned PDF support via OCR
ocr = [
    "docling>=1.0",
    "pytesseract>=0.3",
    "pdf2image>=1.16",
]

# Google Workspace (Docs, Sheets, Slides)
google = [
    "google-api-python-client>=2.100",
    "google-auth>=2.20",
    "google-auth-httplib2>=0.2",
]

# Legacy Microsoft formats (.doc, .xls, .ppt) — requires LibreOffice installed
legacy = [
    "python-docx>=1.1",  # already in core, listed for clarity
]

# AI-powered image captioning
vision = [
    "openai>=1.0",
    "anthropic>=0.20",
    "ollama>=0.1",
]

# Development
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.9",
    "distill-core[ocr,google,vision]",
]

# Install everything
all = [
    "distill-core[ocr,google,vision]",
]

[project.urls]
Homepage   = "https://github.com/lakshgk/distill"
Repository = "https://github.com/lakshgk/distill"
Issues     = "https://github.com/lakshgk/distill/issues"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict         = false
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths   = ["tests"]
addopts     = "-v --tb=short"
