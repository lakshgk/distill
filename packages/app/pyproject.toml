[build-system]
requires      = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name        = "distill-app"
version     = "0.1.0"
description = "Gradio UI for the Distill document-to-Markdown converter"
readme      = "README.md"
license     = { text = "MIT" }
requires-python = ">=3.10"

dependencies = [
    "distill-core>=0.1.0",
    "gradio>=4.0",
]

[project.scripts]
distill-app = "distill_app.__main__:main"

[project.urls]
Homepage   = "https://github.com/lakshgk/distill"
Repository = "https://github.com/lakshgk/distill"

[tool.setuptools.packages.find]
where = ["."]
