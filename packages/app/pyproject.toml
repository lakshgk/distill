[build-system]
requires      = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name        = "distill-app"
version     = "0.1.0"
description = "Web UI for the Distill document-to-Markdown converter"
readme      = "README.md"
license     = { text = "MIT" }
requires-python = ">=3.10"

dependencies = [
    "distill-core>=0.1.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "python-multipart>=0.0.9",
    "redis>=5.0",
    "celery>=5.3",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "fakeredis>=2.0",
]

[project.scripts]
distill-app = "distill_app.__main__:main"

[project.urls]
Homepage   = "https://github.com/lakshgk/distill"
Repository = "https://github.com/lakshgk/distill"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
distill_app = ["static/*"]
